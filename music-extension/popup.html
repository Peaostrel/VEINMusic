<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 260px; padding: 16px; background: #121212; color: white; font-family: system-ui, sans-serif; margin: 0; text-align: center; }
        h3 { margin-top: 0; color: #ffcc00; font-weight: 900; letter-spacing: 1px; }
        .box { background: #1a1a1a; padding: 12px; border: 1px solid #333; border-radius: 8px; margin-top: 10px; }
        .error { color: #ef4444; font-size: 13px; font-weight: bold; }
        .success { color: #1DB954; font-size: 13px; font-weight: bold; }
        .username { color: white; font-size: 16px; font-weight: 900; margin: 5px 0; }
    </style>
</head>
<body>
    <h3>VEIN TRACKER</h3>
    
    <div id="unauth-box" class="box">
        <div class="error">Ожидание авторизации...</div>
        <div style="font-size: 11px; color: #888; margin-top: 8px;">Войди в аккаунт на сайте VEIN (localhost:3000), и расширение подключится автоматически.</div>
    </div>

    <div id="auth-box" class="box" style="display: none;">
        <div class="success">✓ Подключено</div>
        <div class="username">@<span id="username-display"></span></div>
        <div style="font-size: 11px; color: #888; margin-top: 8px;">Скроблер работает в фоновом режиме.</div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
